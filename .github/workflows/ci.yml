name: CI

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  rust:
    name: Rust quality
    # The workspace contains the WSL-only daemon/core crates. Windows validates
    # the platform-neutral protocol client through the dedicated Desktop job.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Install Rust 1.97.0
        run: rustup toolchain install 1.97.0 --profile minimal && rustup default 1.97.0 && rustup component add rustfmt clippy
      - name: Check formatting
        run: cargo fmt --all --check
      - name: Check workspace
        run: cargo check --workspace --exclude muxlane-desktop --all-targets
      - name: Lint workspace
        run: cargo clippy --workspace --exclude muxlane-desktop --all-targets --all-features -- -D warnings
      - name: Test workspace
        run: cargo test --workspace --exclude muxlane-desktop --all-features

  frontend:
    name: Frontend quality
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version-file: .node-version
      - name: Enable pnpm
        run: corepack enable
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Check formatting
        run: pnpm format:check
      - name: Lint
        run: pnpm lint
      - name: Typecheck
        run: pnpm typecheck
      - name: Test
        run: pnpm test
      - name: Build
        run: pnpm build

  desktop-windows:
    name: Desktop Rust check (Windows)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version-file: .node-version
      - name: Install Rust 1.97.0
        shell: pwsh
        run: rustup toolchain install 1.97.0 --profile minimal; rustup default 1.97.0
      - name: Check Tauri Rust project
        run: cargo check --manifest-path apps/desktop/src-tauri/Cargo.toml

  security:
    name: Dependency security
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version-file: .node-version
      - name: Enable pnpm
        run: corepack enable
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Audit Node production dependencies
        run: pnpm audit --prod --audit-level=high
      - name: Install Rust 1.97.0
        run: rustup toolchain install 1.97.0 --profile minimal && rustup default 1.97.0
      - name: Install cargo-audit
        run: cargo install cargo-audit --locked
      - name: Audit Rust dependencies
        run: cargo audit
