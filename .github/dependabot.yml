version: 2
updates:
  - package-ecosystem: cargo
    directory: '/'
    schedule:
      interval: weekly
    groups:
      rust-dependencies:
        patterns: ['*']
  - package-ecosystem: npm
    directory: '/'
    schedule:
      interval: weekly
    groups:
      repository-tooling:
        patterns: ['*']
  - package-ecosystem: npm
    directory: '/apps/desktop'
    schedule:
      interval: weekly
    groups:
      desktop-dependencies:
        patterns: ['*']
  - package-ecosystem: github-actions
    directory: '/'
    schedule:
      interval: weekly
    groups:
      github-actions:
        patterns: ['*']
