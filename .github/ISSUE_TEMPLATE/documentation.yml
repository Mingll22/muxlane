name: Documentation improvement
description: Report missing, incorrect, or unclear documentation.
title: 'docs: '
labels: [documentation]
body:
  - type: input
    id: location
    attributes:
      label: Documentation location
      description: Link or path to the affected document.
    validations:
      required: true
  - type: textarea
    id: issue
    attributes:
      label: What is unclear or incorrect?
    validations:
      required: true
  - type: textarea
    id: suggestion
    attributes:
      label: Suggested improvement
  - type: checkboxes
    id: safety
    attributes:
      label: Safety check
      options:
        - label: I did not include credentials, private logs, or personal paths.
          required: true
